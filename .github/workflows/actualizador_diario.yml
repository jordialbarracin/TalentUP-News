name: Actualizador Diario de Noticias y Leads

on:
  schedule:
    # A las 08:00 hora de España peninsular (06:00 UTC) de lunes a viernes
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions en GitHub

jobs:
  actualizar_y_desplegar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install https://github.com/explosion/spacy-models/releases/download/es_core_news_sm-3.7.0/es_core_news_sm-3.7.0.tar.gz

      - name: Ejecutar Rastreador de Noticias
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python rastreador.py

      - name: Comprobar y Subir JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add datos/ Historia_TalentUP/Hemeroteca/
          if git diff --staged --quiet; then
            echo "No hay datos nuevos."
          else
            git commit -m "Automatización: Actualización de datos JSON"
            git push
          fi

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependencias Node y Compilar React
        run: |
          npm install
          npm run build

      - name: Desplegar a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "Despliegue automático de React"
