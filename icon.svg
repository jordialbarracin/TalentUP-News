<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient for U: Google Blue to Google Red -->
    <linearGradient id="gradU" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285F4" />
      <stop offset="100%" stop-color="#EA4335" />
    </linearGradient>
    
    <!-- Gradient for P: Google Red to Google Yellow -->
    <linearGradient id="gradP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA4335" />
      <stop offset="100%" stop-color="#FBBC05" />
    </linearGradient>
  </defs>

  <!-- White Background with slight rounding -->
  <rect width="512" height="512" fill="#ffffff" rx="112" />

  <!-- Letter U -->
  <path d="M 111 166 v 110 c 0 40 30 70 70 70 s 70 -30 70 -70 v -110 h -45 v 110 c 0 15 -10 25 -25 25 s -25 -10 -25 -25 v -110 Z" fill="url(#gradU)" />

  <!-- Letter P -->
  <path d="M 271 166 h 65 c 35 0 65 30 65 65 s -30 65 -65 65 h -20 v 50 h -45 Z M 316 211 v 40 h 20 c 10 0 20 -10 20 -20 s -10 -20 -20 -20 h -20 Z" fill="url(#gradP)" />
</svg>
