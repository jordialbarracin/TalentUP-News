<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentUP - Radar de Leads B2B</title>
    <meta name="description" content="Radar de oportunidades de negocio en RRHH.">
    <!-- Fuentes estilo Google -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    
    <!-- Tailwind CSS (Inyectado via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        google: {
                            blue: '#4285F4',
                            red: '#EA4335',
                            yellow: '#FBBC05',
                            green: '#34A853',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TalentUP">
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen selection:bg-google-blue selection:text-white relative overflow-x-hidden">

    <!-- Orbes decorativos para el Glassmorphism -->
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-google-blue/10 rounded-full blur-[120px] pointer-events-none z-[-1]"></div>
    <div class="fixed bottom-[10%] right-[-10%] w-[40rem] h-[40rem] bg-google-red/5 rounded-full blur-[150px] pointer-events-none z-[-1]"></div>
    <div class="fixed top-[40%] left-[20%] w-[30rem] h-[30rem] bg-google-yellow/5 rounded-full blur-[120px] pointer-events-none z-[-1]"></div>

    <!-- Navbar flotante (Desktop) -->
    <nav class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 bg-white/70 backdrop-blur-xl border border-slate-200 rounded-full px-8 py-4 hidden md:flex items-center shadow-lg">
        <h1 id="logo-desktop" class="text-2xl font-extrabold text-slate-900 mr-10 tracking-wide cursor-pointer hover:scale-105 transition-transform">Talent<span class="text-transparent bg-clip-text bg-gradient-to-r from-google-blue via-google-red to-google-yellow">UP</span></h1>
        
        <div class="flex flex-nowrap items-center space-x-2">
            <button class="filter-btn text-sm font-semibold px-5 py-2.5 rounded-full transition-all duration-300 text-slate-500 hover:text-slate-900 hover:bg-slate-100 border border-transparent whitespace-nowrap" data-categoria="Contratacion">Contratación</button>
            <button class="filter-btn text-sm font-semibold px-5 py-2.5 rounded-full transition-all duration-300 text-slate-500 hover:text-slate-900 hover:bg-slate-100 border border-transparent whitespace-nowrap" data-categoria="Aperturas">Aperturas</button>
            <button class="filter-btn text-sm font-semibold px-5 py-2.5 rounded-full transition-all duration-300 text-slate-500 hover:text-slate-900 hover:bg-slate-100 border border-transparent whitespace-nowrap" data-categoria="Reestructuracion">Reestructuración</button>
            
            <div class="w-px h-6 bg-slate-200 self-center mx-2"></div>
            <a href="index.html" class="text-sm font-semibold px-5 py-2.5 rounded-full transition-all duration-300 bg-slate-100 text-slate-600 hover:bg-slate-200 border border-slate-200 flex items-center">
                📰 Noticias
            </a>
        </div>
    </nav>

    <!-- Filtros Móvil -->
    <div class="md:hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 w-[95%] max-w-md flex flex-col items-center gap-3 pointer-events-none">
        <a href="index.html" class="pointer-events-auto bg-slate-900 text-white text-xs font-bold px-6 py-2.5 rounded-full shadow-lg flex items-center shadow-slate-900/20 active:scale-95 transition-transform">
            📰 Cambiar a Noticias Generales
        </a>
        <div class="pointer-events-auto bg-white/90 backdrop-blur-xl border border-slate-200 rounded-[2rem] p-2 flex justify-between items-center space-x-1 shadow-2xl w-full">
            <button class="filter-btn flex-1 text-[11px] sm:text-xs font-bold py-3 transition-all duration-300 text-slate-500 hover:bg-slate-100 rounded-2xl text-center" data-categoria="Contratacion">Contratación</button>
            <button class="filter-btn flex-1 text-[11px] sm:text-xs font-bold py-3 transition-all duration-300 text-slate-500 hover:bg-slate-100 rounded-2xl text-center" data-categoria="Aperturas">Aperturas</button>
            <button class="filter-btn flex-1 text-[11px] sm:text-xs font-bold py-3 transition-all duration-300 text-slate-500 hover:bg-slate-100 rounded-2xl text-center" data-categoria="Reestructuracion">Reestructuración</button>
        </div>
    </div>

    <!-- Contenido Principal -->
    <main class="pt-10 md:pt-40 pb-32 px-4 md:px-8 max-w-4xl mx-auto">
        <!-- Header Móvil -->
        <div class="md:hidden text-center mb-10">
            <h1 id="logo-mobile" class="text-3xl font-extrabold text-slate-900 tracking-wide cursor-pointer active:scale-95 transition-transform inline-block">Talent<span class="text-transparent bg-clip-text bg-gradient-to-r from-google-blue via-google-red to-google-yellow">UP</span></h1>
        </div>

        <!-- Hero Header Gigante -->
        <header class="mb-16 text-center">
            
            <h2 class="text-5xl md:text-7xl lg:text-[5.5rem] font-extrabold text-slate-900 tracking-tight mb-8 leading-[1.1]" id="section-title">
                Radar de <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-google-blue via-google-red to-google-yellow">Leads B2B</span>
            </h2>
            
            <p class="text-xl md:text-2xl text-slate-500 font-light max-w-2xl mx-auto leading-relaxed">
                Oportunidades de negocio y empresas contratando en tiempo real.
            </p>
        </header>

        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-google-blue mb-6"></div>
            <p class="text-slate-500 font-mono text-sm tracking-widest uppercase">Decodificando datos...</p>
        </div>
        
        <!-- Contenedor del Resumen Gigante -->
        <div id="executive-summary" class="mb-12"></div>

        <!-- Feed Estilo Bento Box -->
        <div id="news-grid" class="flex flex-col gap-6">
            <!-- Las tarjetas de noticias se inyectarán aquí mediante Javascript -->
        </div>
    </main>

    <!-- Modal Inmersivo -->
    <div id="news-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 sm:p-6 opacity-0 transition-opacity duration-300">
        <!-- Backdrop -->
        <div id="modal-backdrop" class="absolute inset-0 bg-slate-900/40 backdrop-blur-md"></div>
        
        <!-- Modal Content -->
        <div id="modal-content-box" class="relative bg-white/90 backdrop-blur-xl w-full max-w-3xl rounded-[2rem] shadow-2xl border border-white/50 overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-[90vh]">
            <!-- Header (Close button) -->
            <div class="flex justify-end p-4 border-b border-slate-100/50">
                <button id="close-modal" class="p-2 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-800 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- Body -->
            <div class="p-6 md:p-10 overflow-y-auto hide-scrollbar flex-1">
                <div class="flex justify-between items-center mb-6" id="modal-meta"></div>
                <h2 id="modal-title" class="text-2xl md:text-3xl font-extrabold text-slate-900 mb-6 leading-tight"></h2>
                <div id="modal-tags" class="flex flex-wrap mb-6"></div>
                <p id="modal-summary" class="text-base md:text-lg text-slate-600 leading-relaxed font-light"></p>
            </div>
            
            <!-- Footer -->
            <div class="p-6 md:p-8 bg-slate-50/50 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center">
                <div class="flex items-center text-slate-500 mb-4 sm:mb-0">
                    <span id="modal-source" class="font-mono text-sm uppercase tracking-widest font-semibold"></span>
                </div>
                <a id="modal-link" href="#" target="_blank" rel="noopener noreferrer" class="w-full sm:w-auto text-center px-8 py-3 bg-slate-900 text-white rounded-full font-bold hover:bg-google-blue transition-colors duration-300 shadow-lg shadow-slate-900/20">
                    Leer Fuente Original
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="datos/leads.js?v=5"></script>
    <script src="leads_app.js?v=5"></script>
</body>
</html>
