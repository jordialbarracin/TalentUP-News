<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentUP - Radar de Leads B2B</title>
    <meta name="description" content="Radar de oportunidades de negocio en RRHH.">
    <!-- Fuentes estilo Google -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    
    <!-- Tailwind CSS (Inyectado via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        google: {
                            blue: '#4285F4',
                            red: '#EA4335',
                            yellow: '#FBBC05',
                            green: '#34A853',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen selection:bg-google-blue selection:text-white relative overflow-x-hidden">

    <!-- Orbes decorativos para el Glassmorphism -->
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-google-blue/10 rounded-full blur-[120px] pointer-events-none z-[-1]"></div>
    <div class="fixed bottom-[10%] right-[-10%] w-[40rem] h-[40rem] bg-google-red/5 rounded-full blur-[150px] pointer-events-none z-[-1]"></div>
    <div class="fixed top-[40%] left-[20%] w-[30rem] h-[30rem] bg-google-yellow/5 rounded-full blur-[120px] pointer-events-none z-[-1]"></div>

    <!-- Navbar flotante (Desktop) -->
    <nav class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 bg-white/70 backdrop-blur-xl border border-slate-200 rounded-full px-8 py-4 hidden md:flex items-center shadow-lg">
        <h1 id="logo-desktop" class="text-2xl font-extrabold text-slate-900 mr-10 tracking-wide cursor-pointer hover:scale-105 transition-transform">Talent<span class="text-transparent bg-clip-text bg-gradient-to-r from-google-blue via-google-red to-google-yellow">UP</span></h1>
        
        <div class="flex space-x-2">
            <button class="filter-btn text-sm font-semibold px-5 py-2.5 rounded-full transition-all duration-300 text-slate-500 hover:text-slate-900 hover:bg-slate-100" data-categoria="Contratacion">Contratación</button>
            <button class="filter-btn text-sm font-semibold px-5 py-2.5 rounded-full transition-all duration-300 text-slate-500 hover:text-slate-900 hover:bg-slate-100" data-categoria="Aperturas">Aperturas</button>
            <button class="filter-btn text-sm font-semibold px-5 py-2.5 rounded-full transition-all duration-300 text-slate-500 hover:text-slate-900 hover:bg-slate-100" data-categoria="Reestructuracion">Reestructuración</button>
            
            <div class="w-px h-6 bg-slate-200 self-center mx-2"></div>
            <button class="loc-filter-btn text-sm font-semibold px-4 py-2 rounded-full transition-all duration-300 text-slate-500 hover:bg-google-red/10 hover:text-google-red" data-ubicacion="Madrid">📍 Madrid</button>
            <button class="loc-filter-btn text-sm font-semibold px-4 py-2 rounded-full transition-all duration-300 text-slate-500 hover:bg-google-red/10 hover:text-google-red" data-ubicacion="Barcelona">📍 BCN</button>
            
            <div class="w-px h-6 bg-slate-200 self-center mx-2"></div>
            <a href="index.html" class="text-sm font-semibold px-5 py-2.5 rounded-full transition-all duration-300 bg-slate-100 text-slate-600 hover:bg-slate-200 border border-slate-200 flex items-center">
                📰 Noticias
            </a>
        </div>
    </nav>

    <!-- Filtros Móvil -->
    <div class="md:hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 w-[90%] max-w-sm">
        <div class="bg-white/80 backdrop-blur-xl border border-slate-200 rounded-[2rem] p-2 flex justify-center space-x-2 shadow-xl overflow-x-auto hide-scrollbar relative">
            <button class="filter-btn text-xs font-bold px-4 py-3 rounded-full transition-all duration-300 text-slate-500 whitespace-nowrap hover:bg-slate-100" data-categoria="Contratacion">Contratación</button>
            <button class="filter-btn text-xs font-bold px-4 py-3 rounded-full transition-all duration-300 text-slate-500 whitespace-nowrap hover:bg-slate-100" data-categoria="Aperturas">Aperturas</button>
            <button class="filter-btn text-xs font-bold px-4 py-3 rounded-full transition-all duration-300 text-slate-500 whitespace-nowrap hover:bg-slate-100" data-categoria="Reestructuracion">Reestructuración</button>
            
            <div class="w-px h-6 bg-slate-200 self-center mx-1"></div>
            <button class="loc-filter-btn text-xs font-bold px-3 py-3 rounded-full transition-all duration-300 text-slate-500 whitespace-nowrap hover:bg-google-red/10 hover:text-google-red" data-ubicacion="Madrid">📍 Mad</button>
            <button class="loc-filter-btn text-xs font-bold px-3 py-3 rounded-full transition-all duration-300 text-slate-500 whitespace-nowrap hover:bg-google-red/10 hover:text-google-red" data-ubicacion="Barcelona">📍 Bcn</button>
            
            <div class="w-px h-6 bg-slate-200 self-center mx-1"></div>
            <a href="index.html" class="text-xs font-bold px-4 py-3 rounded-full transition-all duration-300 bg-slate-100 text-slate-600 whitespace-nowrap flex items-center">
                📰 Noticias
            </a>
        </div>
    </div>

    <!-- Contenido Principal -->
    <main class="pt-10 md:pt-40 pb-32 px-4 md:px-8 max-w-4xl mx-auto">
        <!-- Header Móvil -->
        <div class="md:hidden text-center mb-10">
            <h1 id="logo-mobile" class="text-3xl font-extrabold text-slate-900 tracking-wide cursor-pointer active:scale-95 transition-transform inline-block">Talent<span class="text-transparent bg-clip-text bg-gradient-to-r from-google-blue via-google-red to-google-yellow">UP</span></h1>
        </div>

        <!-- Hero Header Gigante -->
        <header class="mb-16 text-center">
            
            <h2 class="text-5xl md:text-7xl lg:text-[5.5rem] font-extrabold text-slate-900 tracking-tight mb-8 leading-[1.1]" id="section-title">
                Radar de <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-google-blue via-google-red to-google-yellow">Leads B2B</span>
            </h2>
            
            <p class="text-xl md:text-2xl text-slate-500 font-light max-w-2xl mx-auto leading-relaxed">
                Oportunidades de negocio y empresas contratando en tiempo real.
            </p>
        </header>

        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-google-blue mb-6"></div>
            <p class="text-slate-500 font-mono text-sm tracking-widest uppercase">Decodificando datos...</p>
        </div>
        
        <!-- Contenedor del Resumen Gigante -->
        <div id="executive-summary" class="mb-12"></div>

        <!-- Feed Estilo Bento Box -->
        <div id="news-grid" class="flex flex-col gap-6">
            <!-- Las tarjetas de noticias se inyectarán aquí mediante Javascript -->
        </div>
    </main>

    <!-- Scripts -->
    <script src="datos/leads.js"></script>
    <script src="leads_app.js"></script>
</body>
</html>
